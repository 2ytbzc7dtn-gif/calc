<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./main.css" rel="stylesheet" type="text/css" />
    <title>Mickey Calculator</title>
</head>

<body>

<div class="Calculator">
<div class="main">

    <div class="screen">
        <div class="digits"></div>
    </div>

    <div class="logo">
        <img src="./images/Disney.png" alt="Disney Logo">
    </div>

    <div class="numbers">

        <div class="row1">
            <img class="btn num" title="7" src="./images/7.png" />
            <img class="btn num" title="8" src="./images/8.png" />
            <img class="btn num" title="9" src="./images/9.png" />
            <img class="btn clear" title="c" src="./images/C.png" />
        </div>

        <div class="row2">
            <img class="btn num" title="4" src="./images/4.png" />
            <img class="btn num" title="5" src="./images/5.png" />
            <img class="btn num" title="6" src="./images/6.png" />
            <img class="btn sign" title="+" src="./images/+.png" />
        </div>

        <div class="row3">
            <img class="btn num" title="1" src="./images/1.png" />
            <img class="btn num" title="2" src="./images/2.png" />
            <img class="btn num" title="3" src="./images/3.png" />
            <img class="btn equal" title="=" src="./images/=.png" />
        </div>

        <div class="row4">
            <img class="btn num" title="0" src="./images/0.png" />
            <img class="btn sign" title="-" src="./images/-.png" />
            <img class="btn sign" title="/" src="./images/÷.png" />
            <img class="btn sign" title="*" src="./images/x.png" />
        </div>

    </div>

</div>
</div>

<script src="./script.js"></script>

</body>
</html>
