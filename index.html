<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./main.css" rel="stylesheet" type="text/css" />
 
    <title>Mickey Calculator</title>
</head>
<body>
        <div class="Calculator">
        <div class="main">
            <div class="screen">
                <div class="digits"></div>
            </div>

            <div class="logo">
                <img src="/images/Disney.png">
            </div>
            <div class="numbers">
                <div class="row1">
                    <img class="btn num" title="7" src="/images/7.png" />
                    <img class="btn num" title="8" src="/images/8.png" />
                    <img class="btn num" title="9" src="/images/9.png" />
                    <img class="btn clear" title="c" src="/images/C.png"/>
                </div>

                <div class="row2">
                    <img class="btn num" id="four" title="4" src="/images/4.png" alt="4"/>
                    <img class="btn num"  id="five"title="5" src="/images/5.png"  alt="5"/>
                    <img class="btn num"   id="six"title="6" src="/images/6.png"  alt="6"/>
                    <img class="btn sign" title="+" id="plus" src="/images/+.png"  alt="+"/>
                </div>

                <div class="row3">
                    <img class="btn num" title="1" src="/images/1.png"  alt="1"/>
                    <img class="btn num" title="2" src="/images/2.png"  alt="2"/>
                    <img class="btn num" title="3" src="/images/3.png" alt="3"/>
                    <img class="btn equal" title="=" id="equals" src="/images/=.png"  alt="="/>
                
                </div>

                <div class="row4">
                    <img class="btn num" title="0" src="/images/0.png" alt="0"/>
                    <img class="btn sign" title="-" src="/images/-.png"  alt="-"/>
                    <img class="btn sign" title="/" src="/images/÷.png" alt="/"/>
                    <img class="btn sign" title="*" src="/images/x.png" alt="*"/>
                </div>

            </div>
        </div>
        </div>
        <script src="./script.js"></script>
</body>

</html>
